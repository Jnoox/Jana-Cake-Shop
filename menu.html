<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Jana Cake Shop</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/shop-logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> 

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<body>

    <!-- header & Navbar -->
    <header id="mainheader">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/shop-logo.png" alt="logo" height="45">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navMenu">
                <i class="bi bi-list text-white fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Order</a></li>
                    <li class="nav-item">
                        <a class="btn-pink ms-2" href="menu.html">View Menu</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

    <!-- layout -->
    <div class="container my-4">

 <div class="menu-header mb-4">
    <div>
        <h1 class="menu-title">Our Menu 🍰</h1>
        <p class="menu-subtitle">Fresh baked cakes, made with love</p>
    </div>
    <input type="search" id="search" class="searchbox"
           placeholder="🔍 Search cakes..." onkeyup="searchCakes()">
</div>

  <div class="row row-cols-2 row-cols-md-4 g-3" id="cards-row">

    <div class="col">
      <a class="cake-card card h-100" href="chocolate.html">
        <img src="images/chocolate_cake.jpg" alt="Chocolate Cake">
        <div class="card-body text-center">
          <h6 class="card-title fw-bold">Chocolate Cake</h6>
          <p class="price mb-0">45 SAR</p>
        </div>
      </a>
    </div>

    <div class="col">
      <a class="cake-card card h-100" href="strawberry.html">
        <img src="images/Strawberry-Cake.jpg" alt="Strawberry Cake">
        <div class="card-body text-center">
          <h6 class="card-title fw-bold">Strawberry Cake</h6>
          <p class="price mb-0">50 SAR</p>
        </div>
      </a>
    </div>

    <div class="col">
      <a class="cake-card card h-100" href="cheesecake.html">
        <img src="images/cheese-cake.jpeg" alt="Cheesecake">
        <div class="card-body text-center">
          <h6 class="card-title fw-bold">Cheesecake</h6>
          <p class="price mb-0">55 SAR</p>
        </div>
      </a>
    </div>

    <div class="col">
      <a class="cake-card card h-100" href="carrot.html">
        <img src="images/carrot-cake.jpg" alt="Carrot Cake">
        <div class="card-body text-center">
          <h6 class="card-title fw-bold">Carrot Cake</h6>
          <p class="price mb-0">40 SAR</p>
        </div>
      </a>
    </div>

  </div>
</div>

        <!-- Footer content -->
        <footer>
            <p>Our address is
            <address>Jana Cake Shop - Bakery Street 555 Jeddah </address>
            </p>
            <small>© 2026 Jana Cake Shop</small>
        </footer>
    

    <script src="js/index-script.js"></script>

</body>

</html>
