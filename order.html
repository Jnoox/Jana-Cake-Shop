<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order | Jana Cake Shop</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/shop-logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<body>

    <!-- header & Navbar -->
   <header id="mainheader">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/shop-logo.png" alt="logo" height="45">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navMenu">
                <i class="bi bi-list text-white fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Order</a></li>
                    <li class="nav-item">
                        <a class="btn-pink ms-2" href="menu.html">View Menu</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header> 

    <!-- layout -->
    <div class="container my-4" style="max-width:560px">
        <h2>📝 Place an Order</h2>

        <div class="mb-3">
            <label class="form-label fw-semibold">Your Name</label>
            <input type="text" id="name" class="form-control" placeholder="Jana">
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Cake Type</label>
            <select id="cake" class="form-select">
                <option>Chocolate Cake</option>
                <option>Strawberry Cake</option>
                <option>Cheesecake</option>
                <option>Carrot Cake</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Choose your location</label>
            <div id="map" style="height:250px;border-radius:10px;overflow:hidden"></div>
            <p id="map-location" class="text-muted mt-1 small"></p>
        </div>

        <button class="btn-pink w-100" onclick="addOrder()">
            <i class="bi bi-send-fill me-1"></i> Send Order
        </button>

        <h5 class="mt-4">My Orders</h5>
        <ul id="ordersList" class="list-group mt-2"></ul>
    </div>

    <!-- Footer content -->
    <footer>
        <p>Our address is
        <address>Jana Cake Shop - Bakery Street 555 Jeddah </address>
        </p>
        <small>© 2026 Jana Cake Shop</small>
    </footer>


    <script src="js/index-script.js"></script>
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg&callback=initMap&v=weekly"
        defer></script>
</body>

</html>
